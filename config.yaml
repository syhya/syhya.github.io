# ──────────────────────────────────────────────────────────────────────────────
# Base Configuration
# ──────────────────────────────────────────────────────────────────────────────
baseURL: "https://syhya.github.io/"
title: "Yue Shui Blog"
pagination:
  pagerSize: 5
theme: ["PaperMod"]

# Default Language Code
languageCode: "en-us"

publishDir: "public"

# Site build options
enableGitInfo: false          # 使用 git 最近一次 commit 作为 .Lastmod
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableInlineShortcodes: true
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true
  minifyOutput: true

# Disable RSS (except where explicitly enabled)
disableKinds:
  - RSS

googleAnalytics: "G-SZ2660B91F"

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

# ──────────────────────────────────────────────────────────────────────────────
# Math & Markup
# ──────────────────────────────────────────────────────────────────────────────
markup:
  tableOfContents:
    endLevel: 4
    ordered: false
    startLevel: 2
  goldmark:
    duplicateResourceFiles: false
    extensions:
      cjk:
        eastAsianLineBreaks: false
        eastAsianLineBreaksStyle: simple
        enable: false
        escapedSpace: false
      definitionList: true
      extras:
        delete:
          enable: false
        insert:
          enable: false
        mark:
          enable: false
        subscript:
          enable: false
        superscript:
          enable: false
      footnote: true
      linkify: true
      linkifyProtocol: https
      passthrough:
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
        enable: true
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderHooks:
      image:
        useEmbedded: never
      link:
        useEmbedded: never
    renderer:
      hardWraps: false
      unsafe: false
      xhtml: false

# ──────────────────────────────────────────────────────────────────────────────
# Multilingual Configuration
# ──────────────────────────────────────────────────────────────────────────────
languages:
  en:
    languageName: "English"
    weight: 1
    contentDir: "content/en"
    languageCode: "en-us"
    title: "Yue Shui Blog"

    params:
      fancybox: true
      math: true
      env: production
      title: "Yue Shui Blog"
      description: "Yue Shui’s personal blog exploring cutting-edge LLM technologies and research papers, with a focus on models, algorithms, and engineering."
      keywords: [Blog, Portfolio, PaperMod]
      author: "Yue Shui"

      images: []

      DateFormat: "2006-01-02"
      ShowLastMod: true
      ShowLastModInList: true

      defaultTheme: auto
      disableThemeToggle: false

      ShowReadingTime: true
      ShowWordCount: true
      ShowShareButtons: true
      ShowPostNavLinks: true
      ShowBreadCrumbs: true
      ShowCodeCopyButtons: true
      ShowRssButtonInSectionTermList: true
      UseHugoToc: true
      showtoc: true
      tocopen: false
      disableSpecial1stPost: false
      disableScrollToTop: false
      comments: true
      hidemeta: false
      hideSummary: false

      label:
        text: "Home"
