          url: "https://www.linkedin.com/in/yue-shui/"
        - name: github
          url: "https://github.com/syhya"
        - name: email
          url: "mailto:syhya925666582@gmail.com"

      analytics:
        google:
          SiteVerificationTag: "XYZabc"
        bing:
          SiteVerificationTag: "XYZabc"
        yandex:
          SiteVerificationTag: "XYZabc"

      cover:
        hidden: true
        hiddenInList: true
        hiddenInSingle: true

      fuseOpts:
        isCaseSensitive: false
        shouldSort: true
        location: 0
        distance: 1000
        threshold: 0.4
        minMatchCharLength: 0
        limit: 10
        keys: ["title", "permalink", "summary", "content"]

      contact:
        email: "syhya925666582@gmail.com"

    menu:
      main:
        - name: Archive
          url: /archives/
          weight: 5
        - name: Search
          url: /search/
          weight: 10
        - identifier: tags
          name: Tags
          url: /tags/
